{% extends 'blog/base.html' %}
{% block content %}
    <h1>Статья</h1>
    <p>Заголовок: {{ object.title }}</p>
    <p><img src="{{ object.image.url }}" alt="{{ object.title }}"></p>
    <p>Содержание статьи: {{ object.content }}</p>
    <p>Дата публикации: {{ object.created_at }}</p>
    <p>Количество просмотров: {{ object.num_views }}</p>
    <a class="p-2 btn btn-outline-danger" href="{% url 'blog:article_delete' %}">Удалить статью</a>
{% endblock %}
