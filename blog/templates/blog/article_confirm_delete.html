% extends 'blog/base.html' %}
{% block content %}
    <h1>Вы действительно хотите удалить статью?</h1>
    <p>Статья - {{ object.title }}</p>
    <p>Дата публикации: {{ object.created_at }}</p>
    <p>Количество просмотров: {{ object.num_views }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'blog:article_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
