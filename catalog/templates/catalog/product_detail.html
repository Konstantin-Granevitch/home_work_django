{% extends 'base.html' %}
{% block content %}
    <h1>Детали товара</h1>
    <p>Категория товара: {{ object.category }}</p>
    <p>Название товара: {{ object.name }}</p>
    <p>Цена товара: {{ object.purchase_price }}</p>
    <p><img src="{{ object.image.url }}" alt="{{ product.name }}"></p>
    <p>Описание товара: {{ object.description }}</p>
    {% include 'footer.html' %}
{% endblock %}
