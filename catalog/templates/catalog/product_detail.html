{% extends 'base.html' %}
{% block content %}
    <h1>Детали товара</h1>
    <p>Категория товара: {{ product.category }}</p>
    <p>Название товара: {{ product.name }}</p>
    <p>Цена товара: {{ product.purchase_price }}</p>
    <p>Фото: <img src="{{ product.image.url }}" alt="{{ product.name }}"></p>
    <p>Описание товара: {{ product.description }}</p>
    {% include 'footer.html' %}
{% endblock %}
